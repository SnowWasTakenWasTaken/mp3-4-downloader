name: Build macOS and Linux distributions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*" # Triggers the release process on tags like v1.0.0
  pull_request:

permissions:
  contents: write # Required to create the release and upload assets

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build Linux distribution
        run: bash ./build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube_downloader-linux
          path: dist/youtube_downloader-linux

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build macOS distribution
        run: bash ./build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube_downloader-macos
          path: dist/youtube_downloader-macos

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos] # Wait for both build jobs to finish
    if: startsWith(github.ref, 'refs/tags/v') # Only run if triggered by a v* tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: youtube_downloader-linux
          path: ./release-assets

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: youtube_downloader-macos
          path: ./release-assets

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            ./release-assets/* \
            --repo="$GITHUB_REPOSITORY" \
            --title="Release $TAG" \
            --generate-notes
